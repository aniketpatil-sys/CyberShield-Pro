<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberShield Pro — Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cyan:#00d4ff; --green:#00ff9d; --red:#ff2d55;
      --bg:#060a0f; --panel:#0d1117; --border:#1e2d3d; --text:#c9d8e8; --muted:#4a6070;
    }
    *,*::before,*::after{box-sizing:border-box}
    body{
      margin:0;background:var(--bg);color:var(--text);
      font-family:'Share Tech Mono',monospace;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);
      background-size:44px 44px;
      animation:gm 25s linear infinite;pointer-events:none;
    }
    @keyframes gm{to{background-position:44px 44px}}
    .glow-orb{
      position:fixed;width:500px;height:500px;border-radius:50%;
      background:radial-gradient(circle,rgba(0,212,255,.07) 0%,transparent 70%);
      pointer-events:none;z-index:0;
    }
    .orb1{top:-100px;left:-100px}
    .orb2{bottom:-150px;right:-150px;background:radial-gradient(circle,rgba(0,255,157,.05) 0%,transparent 70%)}
    .card{
      position:relative;z-index:1;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:4px;
      padding:3rem 2.5rem;
      width:100%;max-width:420px;
      box-shadow:0 0 60px rgba(0,0,0,.6);
    }
    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    }
    .logo{
      text-align:center;margin-bottom:2.5rem;
    }
    .logo-icon{
      width:56px;height:56px;border:2px solid var(--cyan);border-radius:4px;
      display:inline-flex;align-items:center;justify-content:center;
      font-size:1.5rem;color:var(--cyan);
      box-shadow:0 0 20px rgba(0,212,255,.3),inset 0 0 20px rgba(0,212,255,.05);
      animation:pulse 3s ease-in-out infinite;margin-bottom:.75rem;
    }
    @keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(0,212,255,.3)}50%{box-shadow:0 0 35px rgba(0,212,255,.6)}}
    .logo-title{
      font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;
      letter-spacing:.15em;color:#fff;display:block;
    }
    .logo-title span{color:var(--cyan)}
    .logo-sub{font-size:.62rem;color:var(--muted);letter-spacing:.25em;text-transform:uppercase;display:block;margin-top:.25rem}

    label{display:block;font-size:.68rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:.4rem}
    .field{margin-bottom:1.25rem}
    input[type=text],input[type=password]{
      width:100%;background:#060a0f;border:1px solid var(--border);
      border-radius:3px;padding:.85rem 1rem;
      color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.88rem;
      outline:none;transition:border-color .2s,box-shadow .2s;
    }
    input:focus{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan),0 0 12px rgba(0,212,255,.15)}
    input::placeholder{color:var(--muted)}

    .btn{
      width:100%;padding:.9rem;background:transparent;
      border:1px solid var(--cyan);color:var(--cyan);
      font-family:'Orbitron',sans-serif;font-size:.78rem;font-weight:700;
      letter-spacing:.2em;text-transform:uppercase;border-radius:3px;
      cursor:pointer;position:relative;overflow:hidden;transition:color .2s;
      margin-top:.5rem;
    }
    .btn::before{
      content:'';position:absolute;inset:0;background:var(--cyan);
      transform:scaleX(0);transform-origin:left;transition:transform .25s ease;z-index:0;
    }
    .btn:hover::before{transform:scaleX(1)}
    .btn:hover{color:var(--bg)}
    .btn span{position:relative;z-index:1}

    .error-box{
      background:rgba(255,45,85,.08);border:1px solid rgba(255,45,85,.4);
      border-radius:3px;padding:.75rem 1rem;margin-bottom:1.25rem;
      color:var(--red);font-size:.78rem;text-align:center;
    }
    .back-link{
      display:block;text-align:center;margin-top:1.5rem;
      font-size:.68rem;color:var(--muted);text-decoration:none;
      letter-spacing:.1em;transition:color .2s;
    }
    .back-link:hover{color:var(--cyan)}
    .secure-badge{
      display:flex;align-items:center;justify-content:center;gap:.5rem;
      margin-top:1.75rem;font-size:.62rem;color:var(--muted);letter-spacing:.15em;
    }
    .secure-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
      box-shadow:0 0 6px var(--green);animation:blink 2s step-end infinite}
    @keyframes blink{50%{opacity:0}}
  </style>
</head>
<body>
  <div class="glow-orb orb1"></div>
  <div class="glow-orb orb2"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <span class="logo-title">CYBER<span>SHIELD</span> PRO</span>
      <span class="logo-sub">Admin Access Portal</span>
    </div>

    {% if error %}
    <div class="error-box">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/login" autocomplete="off">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn"><span>▶ AUTHENTICATE</span></button>
    </form>

    <a href="/" class="back-link">← Return to Scanner</a>

    <div class="secure-badge">
      <span class="secure-dot"></span>
      ENCRYPTED SESSION · ROLE-BASED ACCESS
    </div>
  </div>
</body>
</html>
`
